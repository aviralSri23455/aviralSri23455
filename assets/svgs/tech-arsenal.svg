<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="3D Rotating Tech Stack Cube">
  <defs>
    <radialGradient id="cbg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a1530"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff00e5" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="cg"><feGaussianBlur stdDeviation="1.4"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#cbg)"/>

  <!-- subtle grid -->
  <g stroke="#00ffff" stroke-opacity="0.06">
    <path d="M0 300 H600 M300 0 V600"/>
    <circle cx="300" cy="300" r="220" fill="none"/>
    <circle cx="300" cy="300" r="160" fill="none"/>
    <circle cx="300" cy="300" r="100" fill="none"/>
  </g>

  <!-- Rotating cube via transform animation -->
  <g transform="translate(300 300)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
      <!-- Back face -->
      <g transform="skewY(-20) translate(-120 -60)">
        <rect x="-90" y="-90" width="180" height="180" fill="url(#face)" stroke="#ff00e5" stroke-opacity="0.7"/>
        <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" fill="#ff00e5" font-weight="700">AI / ML</text>
        <text x="0" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ffb8f0">PyTorch</text>
        <text x="0" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ffb8f0">LangChain</text>
        <text x="0" y="46" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ffb8f0">OpenAI</text>
      </g>
      <!-- Right face -->
      <g transform="skewY(20) translate(120 -60)">
        <rect x="-90" y="-90" width="180" height="180" fill="url(#face)" stroke="#00ffff" stroke-opacity="0.8"/>
        <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" fill="#00ffff" font-weight="700">FRONTEND</text>
        <text x="0" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#b8fbff">React / Next</text>
        <text x="0" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#b8fbff">TypeScript</text>
        <text x="0" y="46" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#b8fbff">Tailwind</text>
      </g>
      <!-- Front face -->
      <g transform="translate(0 90)">
        <rect x="-90" y="-90" width="180" height="180" fill="url(#face)" stroke="#7afcff" stroke-opacity="0.9"/>
        <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" fill="#fff" font-weight="700">BACKEND</text>
        <text x="0" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#dffbff">Node · FastAPI</text>
        <text x="0" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#dffbff">Postgres · Redis</text>
        <text x="0" y="46" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#dffbff">GraphQL</text>
      </g>
    </g>
  </g>

  <!-- Orbiting satellites -->
  <g filter="url(#cg)">
    <circle r="6" fill="#00ffff">
      <animateMotion dur="6s" repeatCount="indefinite" path="M300,80 a220,220 0 1,1 -0.1,0"/>
    </circle>
    <circle r="5" fill="#ff00e5">
      <animateMotion dur="9s" repeatCount="indefinite" path="M300,140 a160,160 0 1,0 -0.1,0"/>
    </circle>
    <circle r="4" fill="#7afcff">
      <animateMotion dur="4s" repeatCount="indefinite" path="M300,200 a100,100 0 1,1 -0.1,0"/>
    </circle>
  </g>

  <text x="300" y="570" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#7afcff" letter-spacing="4">TECH · STACK · CORE</text>
</svg>