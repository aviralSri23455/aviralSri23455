<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 20" width="900" height="20">
  <rect width="900" height="20" fill="#0d1117"/>
  
  <!-- Base line -->
  <line x1="50" y1="10" x2="850" y2="10" stroke="#00FFFF" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Traveling energy pulse (cyan, left to right) -->
  <rect x="50" y="9" width="80" height="2" rx="1" fill="#00FFFF" opacity="0">
    <animate attributeName="x" values="50;850" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Traveling energy pulse (pink, right to left, delayed) -->
  <rect x="850" y="9" width="60" height="2" rx="1" fill="#FF6B9D" opacity="0">
    <animate attributeName="x" values="850;50" dur="3s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" dur="3s" repeatCount="indefinite" begin="1s"/>
  </rect>
  
  <!-- Traveling energy pulse (purple, left to right, offset) -->
  <rect x="50" y="9" width="40" height="2" rx="1" fill="#BB66FF" opacity="0">
    <animate attributeName="x" values="50;850" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
  </rect>

  <!-- Center diamond burst -->
  <rect x="447" y="7" width="6" height="6" fill="#00FFFF" opacity="0.4" transform="rotate(45 450 10)">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Floating particles along the line -->
  <circle cx="150" cy="10" r="1.5" fill="#00FFFF" opacity="0">
    <animate attributeName="cy" values="10;4;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="10" r="1" fill="#FF6B9D" opacity="0">
    <animate attributeName="cy" values="10;5;10" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="450" cy="10" r="1.5" fill="#BB66FF" opacity="0">
    <animate attributeName="cy" values="10;3;10" dur="2s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="600" cy="10" r="1" fill="#00FFFF" opacity="0">
    <animate attributeName="cy" values="10;5;10" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="750" cy="10" r="1.5" fill="#FFBD2E" opacity="0">
    <animate attributeName="cy" values="10;4;10" dur="2s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="2s" repeatCount="indefinite" begin="2s"/>
  </circle>
</svg>