<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <clipPath id="card1"><rect x="20" y="20" width="200" height="180" rx="12"/></clipPath>
    <clipPath id="card2"><rect x="237" y="20" width="200" height="180" rx="12"/></clipPath>
    <clipPath id="card3"><rect x="454" y="20" width="200" height="180" rx="12"/></clipPath>
    <clipPath id="card4"><rect x="671" y="20" width="200" height="180" rx="12"/></clipPath>
  </defs>
  <rect width="900" height="220" fill="#0d1117"/>

  <!-- ═══ CARD 1: ERINE AI ═══ -->
  <rect x="20" y="20" width="200" height="180" rx="12" fill="#161b22"/>
  <!-- Rotating border beam -->
  <rect x="20" y="20" width="200" height="180" rx="12" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="60 700" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="760" to="0" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Second counter-rotating beam -->
  <rect x="20" y="20" width="200" height="180" rx="12" fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="30 730" stroke-linecap="round" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="0" to="760" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Holographic scan line -->
  <rect x="20" y="20" width="200" height="4" rx="2" fill="#FFD700" opacity="0" clip-path="url(#card1)">
    <animate attributeName="y" values="20;200;20" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Trophy with bounce -->
  <text x="120" y="70" text-anchor="middle" font-size="32" opacity="0">&#x1F3C6;
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0;0,-4;0,0" dur="1s" begin="0.5s" fill="freeze"/>
  </text>
  <!-- Rank badge glow -->
  <circle cx="120" cy="58" r="20" fill="#FFD700" opacity="0">
    <animate attributeName="r" values="15;30;15" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.15;0;0.15" dur="2.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <text x="120" y="100" text-anchor="middle" font-family="monospace" font-size="13" fill="#FFD700" font-weight="bold" opacity="0">
    Erine AI<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.8s" fill="freeze"/>
  </text>
  <text x="120" y="130" text-anchor="middle" font-family="monospace" font-size="22" fill="#ffffff" font-weight="bold" opacity="0">
    1st Place<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1s" fill="freeze"/>
  </text>
  <!-- Glitch effect on rank text -->
  <text x="121" y="130" text-anchor="middle" font-family="monospace" font-size="22" fill="#FFD700" font-weight="bold" opacity="0">
    1st Place<animate attributeName="opacity" values="0;0.3;0;0;0" dur="3s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="x" values="121;119;121" dur="0.1s" repeatCount="indefinite" begin="2s"/>
  </text>
  <text x="120" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e" letter-spacing="1" opacity="0">
    AI/ML CATEGORY<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.2s" fill="freeze"/>
  </text>
  <!-- Sparkle particles -->
  <circle cx="50" cy="40" r="1.5" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="r" values="0;2;0" dur="2s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="180" cy="60" r="1" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="r" values="0;1.5;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="90" cy="180" r="1.5" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- ═══ CARD 2: MARIADB ═══ -->
  <rect x="237" y="20" width="200" height="180" rx="12" fill="#161b22"/>
  <rect x="237" y="20" width="200" height="180" rx="12" fill="none" stroke="#00FFFF" stroke-width="2" stroke-dasharray="60 700" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="760" to="0" dur="3s" repeatCount="indefinite" begin="0.4s"/>
  </rect>
  <rect x="237" y="20" width="200" height="180" rx="12" fill="none" stroke="#00FFFF" stroke-width="1" stroke-dasharray="30 730" stroke-linecap="round" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="0" to="760" dur="4s" repeatCount="indefinite" begin="0.4s"/>
  </rect>
  <rect x="237" y="20" width="200" height="4" rx="2" fill="#00FFFF" opacity="0" clip-path="url(#card2)">
    <animate attributeName="y" values="20;200;20" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
  </rect>
  <text x="337" y="70" text-anchor="middle" font-size="32" opacity="0">&#x1F3C6;
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0;0,-4;0,0" dur="1s" begin="0.8s" fill="freeze"/>
  </text>
  <circle cx="337" cy="58" r="20" fill="#00FFFF" opacity="0">
    <animate attributeName="r" values="15;30;15" dur="2.5s" repeatCount="indefinite" begin="1.3s"/>
    <animate attributeName="opacity" values="0.12;0;0.12" dur="2.5s" repeatCount="indefinite" begin="1.3s"/>
  </circle>
  <text x="337" y="100" text-anchor="middle" font-family="monospace" font-size="13" fill="#00FFFF" font-weight="bold" opacity="0">
    MariaDB<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.1s" fill="freeze"/>
  </text>
  <text x="337" y="130" text-anchor="middle" font-family="monospace" font-size="22" fill="#ffffff" font-weight="bold" opacity="0">
    Top Finish<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.3s" fill="freeze"/>
  </text>
  <text x="338" y="130" text-anchor="middle" font-family="monospace" font-size="22" fill="#00FFFF" font-weight="bold" opacity="0">
    Top Finish<animate attributeName="opacity" values="0;0.3;0;0;0" dur="3.5s" repeatCount="indefinite" begin="2.3s"/>
    <animate attributeName="x" values="338;336;338" dur="0.1s" repeatCount="indefinite" begin="2.3s"/>
  </text>
  <text x="337" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e" letter-spacing="1" opacity="0">
    DATABASE INNOVATION<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.5s" fill="freeze"/>
  </text>
  <circle cx="267" cy="45" r="1.5" fill="#00FFFF" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="r" values="0;2;0" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="400" cy="170" r="1" fill="#00FFFF" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
  </circle>

  <!-- ═══ CARD 3: AWS ═══ -->
  <rect x="454" y="20" width="200" height="180" rx="12" fill="#161b22"/>
  <rect x="454" y="20" width="200" height="180" rx="12" fill="none" stroke="#FF9900" stroke-width="2" stroke-dasharray="60 700" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="760" to="0" dur="3s" repeatCount="indefinite" begin="0.8s"/>
  </rect>
  <rect x="454" y="20" width="200" height="180" rx="12" fill="none" stroke="#FF9900" stroke-width="1" stroke-dasharray="30 730" stroke-linecap="round" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="0" to="760" dur="4s" repeatCount="indefinite" begin="0.8s"/>
  </rect>
  <rect x="454" y="20" width="200" height="4" rx="2" fill="#FF9900" opacity="0" clip-path="url(#card3)">
    <animate attributeName="y" values="20;200;20" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" dur="4s" repeatCount="indefinite" begin="1s"/>
  </rect>
  <text x="554" y="70" text-anchor="middle" font-size="32" opacity="0">&#x2601;&#xFE0F;
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.1s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0;0,-4;0,0" dur="1s" begin="1.1s" fill="freeze"/>
  </text>
  <circle cx="554" cy="58" r="20" fill="#FF9900" opacity="0">
    <animate attributeName="r" values="15;30;15" dur="2.5s" repeatCount="indefinite" begin="1.6s"/>
    <animate attributeName="opacity" values="0.1;0;0.1" dur="2.5s" repeatCount="indefinite" begin="1.6s"/>
  </circle>
  <text x="554" y="100" text-anchor="middle" font-family="monospace" font-size="13" fill="#FF9900" font-weight="bold" opacity="0">
    AWS Hackathon<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.4s" fill="freeze"/>
  </text>
  <text x="554" y="130" text-anchor="middle" font-family="monospace" font-size="22" fill="#ffffff" font-weight="bold" opacity="0">
    Top 1,000<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.6s" fill="freeze"/>
  </text>
  <text x="555" y="130" text-anchor="middle" font-family="monospace" font-size="22" fill="#FF9900" font-weight="bold" opacity="0">
    Top 1,000<animate attributeName="opacity" values="0;0.3;0;0;0" dur="4s" repeatCount="indefinite" begin="2.6s"/>
    <animate attributeName="x" values="555;553;555" dur="0.1s" repeatCount="indefinite" begin="2.6s"/>
  </text>
  <text x="554" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e" letter-spacing="1" opacity="0">
    CLOUD ARCHITECTURE<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.8s" fill="freeze"/>
  </text>
  <circle cx="484" cy="180" r="1.5" fill="#FF9900" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <circle cx="620" cy="40" r="1" fill="#FF9900" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="r" values="0;1.5;0" dur="3s" repeatCount="indefinite" begin="0.3s"/>
  </circle>

  <!-- ═══ CARD 4: SHIKSHA LOKAM ═══ -->
  <rect x="671" y="20" width="200" height="180" rx="12" fill="#161b22"/>
  <rect x="671" y="20" width="200" height="180" rx="12" fill="none" stroke="#BB66FF" stroke-width="2" stroke-dasharray="60 700" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="760" to="0" dur="3s" repeatCount="indefinite" begin="1.2s"/>
  </rect>
  <rect x="671" y="20" width="200" height="180" rx="12" fill="none" stroke="#BB66FF" stroke-width="1" stroke-dasharray="30 730" stroke-linecap="round" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="0" to="760" dur="4s" repeatCount="indefinite" begin="1.2s"/>
  </rect>
  <rect x="671" y="20" width="200" height="4" rx="2" fill="#BB66FF" opacity="0" clip-path="url(#card4)">
    <animate attributeName="y" values="20;200;20" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0;0.4;0.4;0" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
  </rect>
  <text x="771" y="70" text-anchor="middle" font-size="32" opacity="0">&#x1F4CA;
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0;0,-4;0,0" dur="1s" begin="1.4s" fill="freeze"/>
  </text>
  <circle cx="771" cy="58" r="20" fill="#BB66FF" opacity="0">
    <animate attributeName="r" values="15;30;15" dur="2.5s" repeatCount="indefinite" begin="1.9s"/>
    <animate attributeName="opacity" values="0.1;0;0.1" dur="2.5s" repeatCount="indefinite" begin="1.9s"/>
  </circle>
  <text x="771" y="100" text-anchor="middle" font-family="monospace" font-size="13" fill="#BB66FF" font-weight="bold" opacity="0">
    ShikshaLokam<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.7s" fill="freeze"/>
  </text>
  <text x="771" y="130" text-anchor="middle" font-family="monospace" font-size="22" fill="#ffffff" font-weight="bold" opacity="0">
    Top 12<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.9s" fill="freeze"/>
  </text>
  <text x="772" y="130" text-anchor="middle" font-family="monospace" font-size="22" fill="#BB66FF" font-weight="bold" opacity="0">
    Top 12<animate attributeName="opacity" values="0;0.3;0;0;0" dur="4.5s" repeatCount="indefinite" begin="2.9s"/>
    <animate attributeName="x" values="772;770;772" dur="0.1s" repeatCount="indefinite" begin="2.9s"/>
  </text>
  <text x="771" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e" letter-spacing="1" opacity="0">
    EDTECH CHALLENGE<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.1s" fill="freeze"/>
  </text>
  <circle cx="701" cy="40" r="1.5" fill="#BB66FF" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.7s"/>
    <animate attributeName="r" values="0;2;0" dur="2.5s" repeatCount="indefinite" begin="0.7s"/>
  </circle>
  <circle cx="840" cy="170" r="1" fill="#BB66FF" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="3.2s" repeatCount="indefinite" begin="1.8s"/>
  </circle>

  <!-- ═══ CONNECTING ENERGY LINES between cards ═══ -->
  <line x1="220" y1="110" x2="237" y2="110" stroke="#FFD700" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite" begin="2s"/>
  </line>
  <line x1="437" y1="110" x2="454" y2="110" stroke="#00FFFF" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite" begin="2.5s"/>
  </line>
  <line x1="654" y1="110" x2="671" y2="110" stroke="#FF9900" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite" begin="3s"/>
  </line>
  <!-- Energy dots traveling between cards -->
  <circle cx="220" cy="110" r="2" fill="#FFD700" opacity="0">
    <animate attributeName="cx" values="220;237" dur="0.8s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="437" cy="110" r="2" fill="#00FFFF" opacity="0">
    <animate attributeName="cx" values="437;454" dur="0.8s" repeatCount="indefinite" begin="2.5s"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <circle cx="654" cy="110" r="2" fill="#FF9900" opacity="0">
    <animate attributeName="cx" values="654;671" dur="0.8s" repeatCount="indefinite" begin="3s"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" begin="3s"/>
  </circle>
</svg>