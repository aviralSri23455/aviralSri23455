<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <rect width="900" height="220" fill="#0d1219"/>
  <rect x="1" y="1" width="898" height="218" rx="8" fill="none" stroke="#00FFFF" stroke-width="1.2">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="32" rx="8" fill="#141c26"/>
  <rect x="0" y="20" width="900" height="12" fill="#141c26"/>
  <circle cx="25" cy="16" r="6" fill="#FF5F56"/>
  <circle cx="47" cy="16" r="6" fill="#FFBD2E"/>
  <circle cx="69" cy="16" r="6" fill="#27C93F"/>
  <text x="90" y="20" font-family="JetBrains Mono, monospace" font-size="12" fill="#555">aviral@neural-core ~ % ./boot --mode=dev</text>

  <!-- ONLINE -->
  <circle cx="830" cy="16" r="4" fill="#00FF00">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="840" y="20" font-family="JetBrains Mono, monospace" font-size="10" fill="#00FF00">ONLINE</text>

  <!-- Main name - glitch via SMIL -->
  <text x="37" y="90" font-family="JetBrains Mono, monospace" font-size="52" fill="#ffffff" font-weight="bold" letter-spacing="3">AVIRAL  SRIVASTAVA</text>
  <!-- Cyan glow layer -->
  <text x="39" y="90" font-family="JetBrains Mono, monospace" font-size="52" fill="#00FFFF" font-weight="bold" letter-spacing="3" opacity="0.2">
    <animate attributeName="x" values="39;36;41;39" dur="0.15s" begin="3s" repeatCount="3"/>
    <animate attributeName="opacity" values="0.2;0.5;0.1;0.2" dur="0.15s" begin="3s" repeatCount="3"/>
  </text>
  <!-- Red shift glitch -->
  <text x="35" y="90" font-family="JetBrains Mono, monospace" font-size="52" fill="#FF0050" font-weight="bold" letter-spacing="3" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="0.1s" begin="3.05s" repeatCount="2"/>
    <animate attributeName="x" values="35;40;33;35" dur="0.1s" begin="3.05s" repeatCount="2"/>
  </text>

  <!-- Subtitle -->
  <text x="37" y="130" font-family="JetBrains Mono, monospace" font-size="15" fill="#888">&gt; Full-Stack Engineer · AI Engineer · Bangalore, IN</text>

  <!-- Blinking cursor -->
  <rect x="460" y="115" width="10" height="17" fill="#00FFFF">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Tech tags with SMIL fade-in -->
  <!-- Magenta -->
  <rect x="37" y="155" width="160" height="26" rx="3" fill="#FF00FF" fill-opacity="0.15" stroke="#FF00FF" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1s" fill="freeze"/>
  </rect>
  <text x="47" y="172" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF88FF" font-weight="bold" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1s" fill="freeze"/>LLM · RAG · AGENTS</text>

  <!-- Green -->
  <rect x="212" y="155" width="152" height="26" rx="3" fill="#00FF00" fill-opacity="0.15" stroke="#00FF00" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.4s" fill="freeze"/>
  </rect>
  <text x="222" y="172" font-family="JetBrains Mono, monospace" font-size="11" fill="#88FF88" font-weight="bold" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.4s" fill="freeze"/>REACT · NEXT · TS</text>

  <!-- Yellow -->
  <rect x="379" y="155" width="168" height="26" rx="3" fill="#FFBD2E" fill-opacity="0.15" stroke="#FFBD2E" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.8s" fill="freeze"/>
  </rect>
  <text x="389" y="172" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFDD88" font-weight="bold" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.8s" fill="freeze"/>EDGE · CLOUD · K8S</text>

  <!-- Scanline -->
  <rect x="0" y="-3" width="900" height="3" fill="#00FFFF" opacity="0.04">
    <animate attributeName="y" from="-3" to="220" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents -->
  <path d="M3,5 L3,2 L15,2" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.5"/>
  <path d="M897,5 L897,2 L885,2" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.5"/>
  <path d="M3,215 L3,218 L15,218" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.5"/>
  <path d="M897,215 L897,218 L885,218" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.5"/>
</svg>