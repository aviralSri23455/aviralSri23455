<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <clipPath id="cbClip"><rect x="0" y="0" width="900" height="220" rx="10"/></clipPath>
  </defs>
  <rect width="900" height="220" rx="10" fill="#0d1117"/>

  <!-- ═══ TRIPLE ROTATING BORDER BEAMS ═══ -->
  <rect x="1" y="1" width="898" height="218" rx="10" fill="none" stroke="#00FF88" stroke-width="2" stroke-dasharray="100 2100" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="2200" to="0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="1" y="1" width="898" height="218" rx="10" fill="none" stroke="#00FFFF" stroke-width="1" stroke-dasharray="50 2150" stroke-linecap="round" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="0" to="2200" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="1" y="1" width="898" height="218" rx="10" fill="none" stroke="#FFBD2E" stroke-width="0.8" stroke-dasharray="30 2170" stroke-linecap="round" opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="2200" to="0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ HOLOGRAPHIC SCAN ═══ -->
  <rect x="0" y="0" width="900" height="2" fill="#00FF88" opacity="0" clip-path="url(#cbClip)">
    <animate attributeName="y" values="0;220" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0.3;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ TERMINAL HEADER BAR ═══ -->
  <rect x="20" y="12" width="860" height="30" rx="6" fill="#161b22"/>
  <circle cx="40" cy="27" r="5" fill="#FF5F56"/>
  <circle cx="58" cy="27" r="5" fill="#FFBD2E"/>
  <circle cx="76" cy="27" r="5" fill="#27C93F"/>
  <text x="95" y="31" font-family="monospace" font-size="11" fill="#666">aviral@dev:~/projects $</text>
  <text x="280" y="31" font-family="monospace" font-size="11" fill="#00FF88" font-weight="bold" opacity="0">
    cat currently_building.md
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.5s" fill="freeze"/>
  </text>
  <!-- Cursor after command -->
  <rect x="465" y="20" width="8" height="13" fill="#00FF88">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ ACTIVE STATUS INDICATOR ═══ -->
  <circle cx="850" cy="27" r="4" fill="#00FF88">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="27" r="8" fill="#00FF88" opacity="0">
    <animate attributeName="r" values="4;12;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ PROJECT LINES (typing reveal effect) ═══ -->
  
  <!-- Project 1 -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.2s" fill="freeze"/>
    <text x="40" y="72" font-family="monospace" font-size="11" fill="#00FF88">▸</text>
    <text x="55" y="72" font-family="monospace" font-size="12" fill="#ffffff" font-weight="bold">AI Agent Platform</text>
    <text x="220" y="72" font-family="monospace" font-size="10" fill="#8b949e">— Multi-agent orchestration with LangChain + RAG</text>
    <!-- Status badge -->
    <rect x="600" y="60" width="80" height="18" rx="9" fill="none" stroke="#00FF88" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="618" y="73" font-family="monospace" font-size="9" fill="#00FF88">SHIPPING</text>
  </g>

  <!-- Project 2 -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.6s" fill="freeze"/>
    <text x="40" y="105" font-family="monospace" font-size="11" fill="#00FFFF">▸</text>
    <text x="55" y="105" font-family="monospace" font-size="12" fill="#ffffff" font-weight="bold">Real-time ML Pipeline</text>
    <text x="245" y="105" font-family="monospace" font-size="10" fill="#8b949e">— FastAPI + WebSocket inference at scale</text>
    <rect x="600" y="93" width="80" height="18" rx="9" fill="none" stroke="#00FFFF" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <text x="612" y="106" font-family="monospace" font-size="9" fill="#00FFFF">BUILDING</text>
  </g>

  <!-- Project 3 -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2s" fill="freeze"/>
    <text x="40" y="138" font-family="monospace" font-size="11" fill="#FFBD2E">▸</text>
    <text x="55" y="138" font-family="monospace" font-size="12" fill="#ffffff" font-weight="bold">Open Source Dev Tools</text>
    <text x="250" y="138" font-family="monospace" font-size="10" fill="#8b949e">— CLI + SDK for developer productivity</text>
    <rect x="600" y="126" width="80" height="18" rx="9" fill="none" stroke="#FFBD2E" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <text x="614" y="139" font-family="monospace" font-size="9" fill="#FFBD2E">ACTIVE</text>
  </g>

  <!-- ═══ BOTTOM STATUS BAR ═══ -->
  <rect x="20" y="160" width="860" height="1" fill="#21262d"/>
  <!-- Energy pulse on bottom -->
  <rect x="20" y="160" width="60" height="1" fill="#00FF88" opacity="0">
    <animate attributeName="x" values="20;880" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Commit activity sparkline -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
    <text x="40" y="185" font-family="monospace" font-size="9" fill="#8b949e">COMMITS THIS WEEK:</text>
    <!-- Mini bar chart -->
    <rect x="180" y="182" width="4" height="3" fill="#00FF88" opacity="0.4"/>
    <rect x="186" y="179" width="4" height="6" fill="#00FF88" opacity="0.6"/>
    <rect x="192" y="176" width="4" height="9" fill="#00FF88" opacity="0.8"/>
    <rect x="198" y="173" width="4" height="12" fill="#00FF88"/>
    <rect x="204" y="176" width="4" height="9" fill="#00FF88" opacity="0.8"/>
    <rect x="210" y="178" width="4" height="7" fill="#00FF88" opacity="0.7"/>
    <rect x="216" y="180" width="4" height="5" fill="#00FF88" opacity="0.5"/>
    <!-- Pulsing glow on highest bar -->
    <rect x="198" y="173" width="4" height="12" fill="#00FF88" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Last pushed -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.8s" fill="freeze"/>
    <text x="450" y="185" font-family="monospace" font-size="9" fill="#8b949e">LAST PUSH:</text>
    <text x="530" y="185" font-family="monospace" font-size="9" fill="#00FF88">today</text>
    <circle cx="570" cy="182" r="3" fill="#00FF88">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Streak counter -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.1s" fill="freeze"/>
    <text x="700" y="185" font-family="monospace" font-size="9" fill="#8b949e">STREAK:</text>
    <text x="753" y="185" font-family="monospace" font-size="9" fill="#FFBD2E" font-weight="bold">🔥 active</text>
  </g>

  <!-- ═══ FLOATING PARTICLES ═══ -->
  <circle cx="830" cy="80" r="1" fill="#00FF88" opacity="0">
    <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="860" cy="130" r="1.5" fill="#00FFFF" opacity="0">
    <animate attributeName="cy" values="130;110;130" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="20" cy="200" r="1" fill="#FFBD2E" opacity="0">
    <animate attributeName="cy" values="200;185;200" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
</svg>