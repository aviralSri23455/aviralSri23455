<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 60" width="900" height="60">
  <rect width="900" height="60" fill="#0d1117"/>
  
  <!-- Subtle top/bottom lines -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#00FFFF" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="59" x2="900" y2="59" stroke="#00FFFF" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Scanning line effect -->
  <rect x="0" y="0" width="3" height="60" fill="#00FFFF" opacity="0.08">
    <animate attributeName="x" from="-3" to="900" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Badge 1: Profile Visitors -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.2s" fill="freeze"/>
    <rect x="180" y="15" width="150" height="30" rx="15" fill="#161b22" stroke="#00FFFF" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Pulsing dot -->
    <circle cx="200" cy="30" r="4" fill="#00FF00">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="212" y="34" font-family="monospace" font-size="10" fill="#8b949e">VISITORS</text>
    <text x="275" y="34" font-family="monospace" font-size="11" fill="#00FFFF" font-weight="bold">2,500+</text>
  </g>

  <!-- Badge 2: Portfolio -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
    <rect x="370" y="15" width="160" height="30" rx="15" fill="#161b22" stroke="#BB66FF" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <text x="390" y="34" font-family="monospace" font-size="10" fill="#8b949e">&#x1F310; PORTFOLIO</text>
    <text x="475" y="34" font-family="monospace" font-size="10" fill="#BB66FF" font-weight="bold">LIVE &#x2197;</text>
  </g>

  <!-- Badge 3: GitHub -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.8s" fill="freeze"/>
    <rect x="570" y="15" width="160" height="30" rx="15" fill="#161b22" stroke="#FF6B9D" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <text x="590" y="34" font-family="monospace" font-size="10" fill="#8b949e">&#x2B22; GITHUB</text>
    <text x="660" y="34" font-family="monospace" font-size="10" fill="#FF6B9D" font-weight="bold">36 REPOS</text>
  </g>

  <!-- Corner accents -->
  <path d="M2,5 L2,2 L12,2" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
  <path d="M898,5 L898,2 L888,2" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
  <path d="M2,55 L2,58 L12,58" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
  <path d="M898,55 L898,58 L888,58" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
</svg>