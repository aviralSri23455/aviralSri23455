<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 60" width="900" height="60">
  <defs>
    <clipPath id="sbClip"><rect x="0" y="0" width="900" height="60"/></clipPath>
  </defs>
  <rect width="900" height="60" fill="#0d1117"/>

  <!-- ═══ DUAL ROTATING BORDER BEAMS ═══ -->
  <rect x="0" y="0" width="900" height="60" fill="none" stroke="#00FFFF" stroke-width="1.5" stroke-dasharray="80 1840" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="1920" to="0" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="900" height="60" fill="none" stroke="#BB66FF" stroke-width="1" stroke-dasharray="40 1880" stroke-linecap="round" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="1920" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ SCANNING BEAM (horizontal) ═══ -->
  <rect x="-100" y="0" width="60" height="60" fill="#00FFFF" opacity="0" clip-path="url(#sbClip)">
    <animate attributeName="x" values="-100;950" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.06;0.06;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents with pulse -->
  <path d="M2,8 L2,2 L14,2" fill="none" stroke="#00FFFF" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M898,8 L898,2 L886,2" fill="none" stroke="#00FFFF" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </path>
  <path d="M2,52 L2,58 L14,58" fill="none" stroke="#BB66FF" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
  </path>
  <path d="M898,52 L898,58 L886,58" fill="none" stroke="#BB66FF" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1.5s"/>
  </path>

  <!-- ═══ BADGE 1: Visitors ═══ -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
    <rect x="180" y="13" width="155" height="34" rx="17" fill="#161b22"/>
    <rect x="180" y="13" width="155" height="34" rx="17" fill="none" stroke="#00FFFF" stroke-width="1.2" stroke-dasharray="20 280" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Radar pulse dot -->
    <circle cx="200" cy="30" r="4" fill="#00FF00">
      <animate attributeName="r" values="3;6;3" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="30" r="8" fill="#00FF00" opacity="0">
      <animate attributeName="r" values="4;12;4" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="215" y="34" font-family="monospace" font-size="10" fill="#8b949e">VISITORS</text>
    <text x="280" y="34" font-family="monospace" font-size="11" fill="#00FFFF" font-weight="bold">2,500+</text>
  </g>

  <!-- ═══ BADGE 2: Portfolio ═══ -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.6s" fill="freeze"/>
    <rect x="370" y="13" width="160" height="34" rx="17" fill="#161b22"/>
    <rect x="370" y="13" width="160" height="34" rx="17" fill="none" stroke="#BB66FF" stroke-width="1.2" stroke-dasharray="20 295" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="315" to="0" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <text x="392" y="34" font-family="monospace" font-size="10" fill="#8b949e">&#x1F310; PORTFOLIO</text>
    <text x="480" y="34" font-family="monospace" font-size="10" fill="#BB66FF" font-weight="bold">LIVE &#x2197;</text>
  </g>

  <!-- ═══ BADGE 3: GitHub ═══ -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.9s" fill="freeze"/>
    <rect x="570" y="13" width="155" height="34" rx="17" fill="#161b22"/>
    <rect x="570" y="13" width="155" height="34" rx="17" fill="none" stroke="#FF6B9D" stroke-width="1.2" stroke-dasharray="20 280" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="300" to="0" dur="3s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <text x="592" y="34" font-family="monospace" font-size="10" fill="#8b949e">&#x2B22; GITHUB</text>
    <text x="660" y="34" font-family="monospace" font-size="10" fill="#FF6B9D" font-weight="bold">36 REPOS</text>
  </g>

  <!-- Energy dots traveling between badges -->
  <circle cx="335" cy="30" r="2" fill="#00FFFF" opacity="0">
    <animate attributeName="cx" values="335;370" dur="0.6s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="0.6s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="530" cy="30" r="2" fill="#BB66FF" opacity="0">
    <animate attributeName="cx" values="530;570" dur="0.6s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="0.6s" repeatCount="indefinite" begin="2s"/>
  </circle>
</svg>