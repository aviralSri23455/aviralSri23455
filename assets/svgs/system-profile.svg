<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <style>
      @keyframes typeChar { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      @keyframes glowPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes borderGlow { 0%,100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.7; } }
      .bg { fill: #0a0e1a; }
      .card-bg { fill: #0d1219; }
      .card-border { fill: none; stroke: #00FFFF; stroke-width: 1; animation: borderGlow 4s ease-in-out infinite; }
      .title-bar { fill: #141c26; }
      .dot-red { fill: #FF5F56; }
      .dot-yellow { fill: #FFBD2E; }
      .dot-green { fill: #27C93F; }
      .title-text { font-family: monospace; font-size: 12px; fill: #555; }
      .keyword { font-family: monospace; font-size: 13px; fill: #c678dd; }
      .variable { font-family: monospace; font-size: 13px; fill: #e06c75; }
      .type { font-family: monospace; font-size: 13px; fill: #e5c07b; }
      .string { font-family: monospace; font-size: 13px; fill: #98c379; }
      .punct { font-family: monospace; font-size: 13px; fill: #abb2bf; }
      .prop { font-family: monospace; font-size: 13px; fill: #61afef; }
      .comment { font-family: monospace; font-size: 13px; fill: #5c6370; font-style: italic; }
      .section-title { font-family: monospace; font-size: 14px; fill: #00FFFF; letter-spacing: 4px; font-weight: bold; }
      .diamond { fill: #00FFFF; }
      .line { animation: typeChar 0.3s ease forwards; opacity: 0; }
    </style>
  </defs>
  <rect class="bg" width="900" height="340"/>
  
  <!-- Section header -->
  <rect class="diamond" x="30" y="14" width="8" height="8" transform="rotate(45 34 18)"/>
  <text class="section-title" x="52" y="23">SYSTEM PROFILE</text>
  
  <!-- Terminal card -->
  <rect class="card-bg" x="30" y="40" width="840" height="285" rx="8"/>
  <rect class="card-border" x="30" y="40" width="840" height="285" rx="8"/>
  
  <!-- Title bar -->
  <rect class="title-bar" x="30" y="40" width="840" height="28" rx="8"/>
  <rect class="title-bar" x="30" y="56" width="840" height="12"/>
  <circle class="dot-red" cx="52" cy="54" r="6"/>
  <circle class="dot-yellow" cx="72" cy="54" r="6"/>
  <circle class="dot-green" cx="92" cy="54" r="6"/>
  <text class="title-text" x="120" y="58">aviral.config.ts - developer profile</text>
  
  <!-- Code content -->
  <text class="keyword line" x="55" y="95" style="animation-delay:0.2s">const</text>
  <text class="variable line" x="103" y="95" style="animation-delay:0.3s">aviral</text>
  <text class="punct line" x="155" y="95" style="animation-delay:0.35s">:</text>
  <text class="type line" x="165" y="95" style="animation-delay:0.4s">Developer</text>
  <text class="punct line" x="250" y="95" style="animation-delay:0.45s">= {</text>
  
  <text class="prop line" x="80" y="120" style="animation-delay:0.5s">alias</text>
  <text class="punct line" x="125" y="120" style="animation-delay:0.55s"> : </text>
  <text class="string line" x="145" y="120" style="animation-delay:0.6s">"aviralSri23455"</text>
  <text class="punct line" x="295" y="120" style="animation-delay:0.65s">,</text>
  
  <text class="prop line" x="80" y="145" style="animation-delay:0.7s">role</text>
  <text class="punct line" x="118" y="145" style="animation-delay:0.75s"> : </text>
  <text class="punct line" x="138" y="145" style="animation-delay:0.8s">[</text>
  <text class="string line" x="146" y="145" style="animation-delay:0.85s">"Full-Stack"</text>
  <text class="punct line" x="258" y="145" style="animation-delay:0.9s">, </text>
  <text class="string line" x="272" y="145" style="animation-delay:0.95s">"AI Engineer"</text>
  <text class="punct line" x="388" y="145" style="animation-delay:1.0s">],</text>
  
  <text class="prop line" x="80" y="170" style="animation-delay:1.05s">location</text>
  <text class="punct line" x="152" y="170" style="animation-delay:1.1s"> : </text>
  <text class="string line" x="172" y="170" style="animation-delay:1.15s">"Bangalore, India"</text>
  <text class="punct line" x="332" y="170" style="animation-delay:1.2s">,</text>
  
  <text class="prop line" x="80" y="195" style="animation-delay:1.25s">focus</text>
  <text class="punct line" x="122" y="195" style="animation-delay:1.3s"> : </text>
  <text class="string line" x="142" y="195" style="animation-delay:1.35s">"Production AI + LLM Pipelines + Edge AI"</text>
  <text class="punct line" x="520" y="195" style="animation-delay:1.4s">,</text>
  
  <text class="prop line" x="80" y="220" style="animation-delay:1.45s">stack</text>
  <text class="punct line" x="125" y="220" style="animation-delay:1.5s"> : </text>
  <text class="string line" x="145" y="220" style="animation-delay:1.55s">"TS + Python + React + FastAPI + AWS"</text>
  <text class="punct line" x="485" y="220" style="animation-delay:1.6s">,</text>
  
  <text class="prop line" x="80" y="245" style="animation-delay:1.65s">open</text>
  <text class="punct line" x="115" y="245" style="animation-delay:1.7s"> : </text>
  <text class="keyword line" x="135" y="245" style="animation-delay:1.75s">true</text>
  <text class="punct line" x="170" y="245" style="animation-delay:1.8s">,</text>
  <text class="comment line" x="185" y="245" style="animation-delay:1.85s">// to global opportunities</text>
  
  <text class="prop line" x="80" y="270" style="animation-delay:1.9s">motto</text>
  <text class="punct line" x="125" y="270" style="animation-delay:1.95s"> : </text>
  <text class="string line" x="145" y="270" style="animation-delay:2.0s">"Ship fast. Learn faster. Build things that matter."</text>
  
  <text class="punct line" x="55" y="300" style="animation-delay:2.1s">};</text>
  
  <!-- Cursor -->
  <rect x="75" y="289" width="8" height="14" fill="#00FFFF" style="animation: blink 1.2s step-end infinite; animation-delay: 2.3s"/>
</svg>