    <animate attributeName="height" values="3;18;3;12;3" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="27;12;27;18;27" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="112" y="15" width="4" height="0" rx="2" fill="#00FFFF" opacity="0.7">
    <animate attributeName="height" values="3;24;3;8;3" dur="1.4s" repeatCount="indefinite" begin="0.1s"/>
    <animate attributeName="y" values="27;6;27;22;27" dur="1.4s" repeatCount="indefinite" begin="0.1s"/>
  </rect>
  <rect x="124" y="15" width="4" height="0" rx="2" fill="#00FFFF" opacity="0.8">
