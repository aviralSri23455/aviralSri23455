    <animate attributeName="d" values="
      M0,165 C75,180 150,150 225,165 C300,180 375,150 450,165 C525,180 600,150 675,165 C750,180 825,150 900,165;
      M0,165 C75,150 150,180 225,165 C300,150 375,180 450,165 C525,150 600,180 675,165 C750,150 825,180 900,165;
