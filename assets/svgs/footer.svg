    <animate attributeName="x" values="451;449;451" dur="0.08s" repeatCount="indefinite" begin="2s"/>
  </text>
  <text x="449" y="80" text-anchor="middle" font-family="monospace" font-size="16" fill="#FF6B9D" font-weight="bold" opacity="0">
