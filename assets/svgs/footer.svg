<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <clipPath id="footerClip"><rect x="0" y="0" width="900" height="200"/></clipPath>
  </defs>
  <rect width="900" height="200" fill="#0d1117"/>

  <!-- ═══ TRIPLE ROTATING BORDER BEAMS ═══ -->
  <rect x="1" y="1" width="898" height="198" rx="10" fill="none" stroke="#00FFFF" stroke-width="2" stroke-dasharray="100 2100" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="2200" to="0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="1" y="1" width="898" height="198" rx="10" fill="none" stroke="#FF6B9D" stroke-width="1" stroke-dasharray="50 2150" stroke-linecap="round" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="0" to="2200" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ HOLOGRAPHIC SCAN ═══ -->
  <rect x="0" y="0" width="900" height="2" fill="#00FFFF" opacity="0" clip-path="url(#footerClip)">
    <animate attributeName="y" values="0;200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0.3;0" dur="4s" repeatCount="indefinite"/>
  </rect>

