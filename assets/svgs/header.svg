<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
  <rect width="900" height="250" fill="#0d1117"/>
  
  <!-- Border with pulse -->
  <rect x="1" y="1" width="898" height="248" rx="10" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="34" rx="10" fill="#161b22"/>
  <rect x="0" y="22" width="900" height="12" fill="#161b22"/>
  <circle cx="24" cy="17" r="6" fill="#FF5F56"/>
  <circle cx="46" cy="17" r="6" fill="#FFBD2E"/>
  <circle cx="68" cy="17" r="6" fill="#27C93F"/>
  <text x="92" y="21" font-family="monospace" font-size="12" fill="#666">aviral@dev ~ % ./init --profile</text>
  
  <!-- ONLINE pulse -->
  <circle cx="845" cy="17" r="4" fill="#00FF00">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="855" y="21" font-family="monospace" font-size="9" fill="#00FF00">LIVE</text>

  <!-- NAME -->
  <text x="50" y="90" font-family="monospace" font-size="54" fill="#ffffff" font-weight="bold" letter-spacing="2">AVIRAL SRIVASTAVA</text>
  
  <!-- Glitch cyan layer -->
  <text x="50" y="90" font-family="monospace" font-size="54" fill="#00FFFF" font-weight="bold" letter-spacing="2" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0;0.3;0" dur="0.2s" begin="3s" repeatCount="2"/>
    <animate attributeName="x" values="50;47;53;50" dur="0.2s" begin="3s" repeatCount="2"/>
  </text>
  <!-- Glitch red layer -->
  <text x="50" y="90" font-family="monospace" font-size="54" fill="#FF0050" font-weight="bold" letter-spacing="2" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="0.15s" begin="3.1s" repeatCount="2"/>
    <animate attributeName="x" values="50;54;48;50" dur="0.15s" begin="3.1s" repeatCount="2"/>
  </text>

  <!-- Subtitle -->
  <text x="50" y="125" font-family="monospace" font-size="15" fill="#8b949e">Full-Stack Engineer · AI Engineer · Bangalore, India</text>
  
  <!-- Cursor -->
  <rect x="445" y="110" width="10" height="17" fill="#00FFFF">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Tech tags - staggered fade in -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.8s" fill="freeze"/>
    <rect x="50" y="148" width="95" height="24" rx="12" fill="none" stroke="#FF6B9D" stroke-width="1.2"/>
    <text x="65" y="164" font-family="monospace" font-size="10" fill="#FF6B9D" font-weight="bold">LLM / RAG</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.1s" fill="freeze"/>
    <rect x="158" y="148" width="105" height="24" rx="12" fill="none" stroke="#00FFFF" stroke-width="1.2"/>
    <text x="173" y="164" font-family="monospace" font-size="10" fill="#00FFFF" font-weight="bold">REACT / TS</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.4s" fill="freeze"/>
    <rect x="276" y="148" width="90" height="24" rx="12" fill="none" stroke="#FFBD2E" stroke-width="1.2"/>
    <text x="291" y="164" font-family="monospace" font-size="10" fill="#FFBD2E" font-weight="bold">PYTHON</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.7s" fill="freeze"/>
    <rect x="379" y="148" width="65" height="24" rx="12" fill="none" stroke="#FF9900" stroke-width="1.2"/>
    <text x="394" y="164" font-family="monospace" font-size="10" fill="#FF9900" font-weight="bold">AWS</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.0s" fill="freeze"/>
    <rect x="457" y="148" width="100" height="24" rx="12" fill="none" stroke="#27C93F" stroke-width="1.2"/>
    <text x="472" y="164" font-family="monospace" font-size="10" fill="#27C93F" font-weight="bold">DOCKER</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.3s" fill="freeze"/>
    <rect x="570" y="148" width="110" height="24" rx="12" fill="none" stroke="#BB66FF" stroke-width="1.2"/>
    <text x="585" y="164" font-family="monospace" font-size="10" fill="#BB66FF" font-weight="bold">LANGCHAIN</text>
  </g>

  <!-- Bottom stats -->
  <line x1="50" y1="190" x2="850" y2="190" stroke="#21262d" stroke-width="1"/>
  
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.8s" fill="freeze"/>
    <text x="350" y="220" text-anchor="middle" font-family="monospace" font-size="24" fill="#00FFFF" font-weight="bold">Top 1K</text>
    <text x="350" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">AWS GLOBAL</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.1s" fill="freeze"/>
    <text x="550" y="220" text-anchor="middle" font-family="monospace" font-size="24" fill="#00FFFF" font-weight="bold">5</text>
    <text x="550" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">LANGUAGES</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.4s" fill="freeze"/>
    <text x="750" y="220" text-anchor="middle" font-family="monospace" font-size="24" fill="#00FFFF" font-weight="bold">3</text>
    <text x="750" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">YEARS SHIPPING</text>
  </g>

  <!-- Scanline -->
  <rect x="0" width="900" height="2" fill="#00FFFF" opacity="0.03">
    <animate attributeName="y" from="-2" to="250" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>