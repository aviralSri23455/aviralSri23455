<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <clipPath id="connectPanel"><rect x="1" y="1" width="898" height="338" rx="12"/></clipPath>
  </defs>
  <rect width="900" height="340" fill="#0d1117"/>

  <!-- Main panel with animated border trace -->
  <rect x="1" y="1" width="898" height="338" rx="12" fill="none" stroke="#00FFFF" stroke-width="1.5" stroke-dasharray="200 1800" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="5s" repeatCount="indefinite"/>
  </rect>
  <!-- Second border beam (opposite direction) -->
  <rect x="1" y="1" width="898" height="338" rx="12" fill="none" stroke="#BB66FF" stroke-width="1" stroke-dasharray="100 1900" stroke-linecap="round" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="2000" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Holographic grid overlay -->
  <line x1="0" y1="85" x2="900" y2="85" stroke="#00FFFF" stroke-width="0.3" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0" dur="5s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="170" x2="900" y2="170" stroke="#00FFFF" stroke-width="0.3" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0" dur="5s" repeatCount="indefinite" begin="1s"/>
  </line>
  <line x1="0" y1="255" x2="900" y2="255" stroke="#00FFFF" stroke-width="0.3" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0" dur="5s" repeatCount="indefinite" begin="2s"/>
  </line>

  <!-- Full-width scanning beam -->
  <rect x="0" y="0" width="900" height="2" fill="#00FFFF" opacity="0" clip-path="url(#connectPanel)">
    <animate attributeName="y" values="0;340;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner pulse indicators -->
  <circle cx="25" cy="25" r="4" fill="#00FFFF">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="875" cy="25" r="4" fill="#FF6B9D">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="25" cy="315" r="4" fill="#BB66FF">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="875" cy="315" r="4" fill="#FFBD2E">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>

  <!-- Section title with typewriter reveal -->
  <text x="450" y="38" text-anchor="middle" font-family="monospace" font-size="14" fill="#00FFFF" letter-spacing="6" font-weight="bold" opacity="0">
    CONNECT &amp; COLLABORATE
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.3s" fill="freeze"/>
  </text>
  <!-- Blinking cursor -->
  <rect x="618" y="24" width="9" height="16" fill="#00FFFF">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Divider line that draws itself -->
  <line x1="450" y1="50" x2="450" y2="50" stroke="#21262d" stroke-width="1">
    <animate attributeName="x1" from="450" to="180" dur="0.8s" begin="0.5s" fill="freeze"/>
    <animate attributeName="x2" from="450" to="720" dur="0.8s" begin="0.5s" fill="freeze"/>
  </line>

  <!-- ═══ ROW 1: Portfolio + Twitter ═══ -->
  <!-- Portfolio card -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8s" fill="freeze"/>
    <rect x="130" y="68" width="300" height="45" rx="8" fill="#161b22"/>
    <rect x="130" y="68" width="300" height="45" rx="8" fill="none" stroke="#00FFFF" stroke-width="1.2" stroke-dasharray="40 650" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="690" to="0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="160" y="95" font-family="monospace" font-size="12" fill="#00FFFF" font-weight="bold">&#x1F310; PORTFOLIO</text>
    <text x="295" y="95" font-family="monospace" font-size="10" fill="#8b949e">profile-aviral.vercel.app</text>
  </g>

  <!-- Twitter card -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze"/>
    <rect x="470" y="68" width="300" height="45" rx="8" fill="#161b22"/>
    <rect x="470" y="68" width="300" height="45" rx="8" fill="none" stroke="#1DA1F2" stroke-width="1.2" stroke-dasharray="40 650" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="690" to="0" dur="3s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <text x="500" y="95" font-family="monospace" font-size="12" fill="#1DA1F2" font-weight="bold">&#x1D54F; TWITTER</text>
    <text x="610" y="95" font-family="monospace" font-size="10" fill="#8b949e">@aviralsriv26065</text>
  </g>

  <!-- ═══ ROW 2: Medium + Dev.to ═══ -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
    <rect x="130" y="128" width="300" height="45" rx="8" fill="#161b22"/>
    <rect x="130" y="128" width="300" height="45" rx="8" fill="none" stroke="#00AB6C" stroke-width="1.2" stroke-dasharray="40 650" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="690" to="0" dur="3s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <text x="160" y="155" font-family="monospace" font-size="12" fill="#00AB6C" font-weight="bold">M MEDIUM</text>
    <text x="275" y="155" font-family="monospace" font-size="10" fill="#8b949e">@aviralsrivastava57</text>
  </g>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.4s" fill="freeze"/>
    <rect x="470" y="128" width="300" height="45" rx="8" fill="#161b22"/>
    <rect x="470" y="128" width="300" height="45" rx="8" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="40 650" stroke-linecap="round" opacity="0.7">
      <animate attributeName="stroke-dashoffset" from="690" to="0" dur="3s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
    <text x="500" y="155" font-family="monospace" font-size="12" fill="#ffffff" font-weight="bold">DEV.TO</text>
    <text x="590" y="155" font-family="monospace" font-size="10" fill="#8b949e">aviral_srivastava</text>
  </g>

  <!-- ═══ ROW 3: GitHub (centered) ═══ -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.6s" fill="freeze"/>
    <rect x="300" y="188" width="300" height="45" rx="8" fill="#161b22"/>
    <rect x="300" y="188" width="300" height="45" rx="8" fill="none" stroke="#BB66FF" stroke-width="1.2" stroke-dasharray="40 650" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="690" to="0" dur="3s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
    <text x="330" y="215" font-family="monospace" font-size="12" fill="#BB66FF" font-weight="bold">&#x2B22; GITHUB</text>
    <text x="440" y="215" font-family="monospace" font-size="10" fill="#8b949e">aviralSri23455</text>
    <!-- Activity indicator on GitHub card -->
    <circle cx="570" cy="210" r="3" fill="#00FF88">
      <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══ DIVIDER with pulse ═══ -->
  <line x1="450" y1="252" x2="450" y2="252" stroke="#21262d" stroke-width="1">
    <animate attributeName="x1" from="450" to="200" dur="0.8s" begin="2s" fill="freeze"/>
    <animate attributeName="x2" from="450" to="700" dur="0.8s" begin="2s" fill="freeze"/>
  </line>

  <!-- Quote with fade -->
  <text x="450" y="278" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e" font-style="italic" opacity="0">
    "Ship fast. Learn faster. Build things that matter."
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2.2s" fill="freeze"/>
  </text>

  <!-- CTA with glow pulse -->
  <text x="450" y="310" text-anchor="middle" font-family="monospace" font-size="13" fill="#00FFFF" font-weight="bold" opacity="0">
    Open to collaborate &#x1F91D; Let's build something epic together
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2.5s" fill="freeze"/>
  </text>
  <!-- Glow behind CTA -->
  <rect x="150" y="295" width="600" height="22" rx="10" fill="#00FFFF" opacity="0">
    <animate attributeName="opacity" values="0;0.05;0" dur="3s" repeatCount="indefinite" begin="3s"/>
  </rect>

  <!-- Network connection lines between cards (like neural pathways) -->
  <line x1="430" y1="90" x2="470" y2="90" stroke="#00FFFF" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite" begin="2s"/>
  </line>
  <line x1="430" y1="150" x2="470" y2="150" stroke="#00AB6C" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite" begin="2.5s"/>
  </line>
  <!-- Data pulse dots traveling on network lines -->
  <circle cx="430" cy="90" r="2" fill="#00FFFF" opacity="0">
    <animate attributeName="cx" values="430;470" dur="0.6s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="0.6s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="430" cy="150" r="2" fill="#00AB6C" opacity="0">
    <animate attributeName="cx" values="430;470" dur="0.6s" repeatCount="indefinite" begin="2.5s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="0.6s" repeatCount="indefinite" begin="2.5s"/>
  </circle>

  <!-- Floating ambient particles -->
  <circle cx="80" cy="100" r="1" fill="#00FFFF" opacity="0">
    <animate attributeName="cy" values="100;70;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="150" r="1.5" fill="#BB66FF" opacity="0">
    <animate attributeName="cy" values="150;120;150" dur="5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="450" cy="50" r="1" fill="#FF6B9D" opacity="0">
    <animate attributeName="cy" values="50;30;50" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="150" cy="250" r="1" fill="#FFBD2E" opacity="0">
    <animate attributeName="cy" values="250;225;250" dur="4.5s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="4.5s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="750" cy="280" r="1.5" fill="#00FF88" opacity="0">
    <animate attributeName="cy" values="280;255;280" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>