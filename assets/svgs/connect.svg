<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <rect width="900" height="300" fill="#0d1117"/>
  
  <!-- Animated border -->
  <rect x="1" y="1" width="898" height="298" rx="10" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Section title -->
  <text x="450" y="30" text-anchor="middle" font-family="monospace" font-size="13" fill="#00FFFF" letter-spacing="6" font-weight="bold">CONNECT &amp; COLLABORATE</text>
  <line x1="250" y1="40" x2="650" y2="40" stroke="#21262d" stroke-width="1"/>

  <!-- Row 1: Portfolio + Twitter -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
    <!-- Portfolio card -->
    <rect x="150" y="60" width="280" height="40" rx="6" fill="#161b22" stroke="#00FFFF" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="180" y="84" font-family="monospace" font-size="11" fill="#00FFFF" font-weight="bold">&#x1F310; PORTFOLIO</text>
    <text x="280" y="84" font-family="monospace" font-size="10" fill="#8b949e">profile-aviral.vercel.app</text>
  </g>
  
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
    <!-- Twitter card -->
    <rect x="470" y="60" width="280" height="40" rx="6" fill="#161b22" stroke="#1DA1F2" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <text x="500" y="84" font-family="monospace" font-size="11" fill="#1DA1F2" font-weight="bold">&#x1D54F; TWITTER</text>
    <text x="580" y="84" font-family="monospace" font-size="10" fill="#8b949e">@aviralsriv26065</text>
  </g>

  <!-- Row 2: Medium + Dev.to -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.7s" fill="freeze"/>
    <rect x="150" y="115" width="280" height="40" rx="6" fill="#161b22" stroke="#00AB6C" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <text x="180" y="139" font-family="monospace" font-size="11" fill="#00AB6C" font-weight="bold">M MEDIUM</text>
    <text x="270" y="139" font-family="monospace" font-size="10" fill="#8b949e">@aviralsrivastava57</text>
  </g>
  
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.9s" fill="freeze"/>
    <rect x="470" y="115" width="280" height="40" rx="6" fill="#161b22" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
    <text x="500" y="139" font-family="monospace" font-size="11" fill="#ffffff" font-weight="bold">DEV.TO</text>
    <text x="570" y="139" font-family="monospace" font-size="10" fill="#8b949e">aviral_srivastava</text>
  </g>

  <!-- Row 3: GitHub (centered) -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.1s" fill="freeze"/>
    <rect x="310" y="170" width="280" height="40" rx="6" fill="#161b22" stroke="#BB66FF" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
    <text x="340" y="194" font-family="monospace" font-size="11" fill="#BB66FF" font-weight="bold">&#x2B22; GITHUB</text>
    <text x="430" y="194" font-family="monospace" font-size="10" fill="#8b949e">aviralSri23455</text>
  </g>

  <!-- Divider -->
  <line x1="200" y1="230" x2="700" y2="230" stroke="#21262d" stroke-width="1"/>

  <!-- Quote -->
  <text x="450" y="258" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e" font-style="italic" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>
    "Ship fast. Learn faster. Build things that matter."
  </text>

  <!-- CTA -->
  <text x="450" y="285" text-anchor="middle" font-family="monospace" font-size="12" fill="#00FFFF" font-weight="bold" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2s" fill="freeze"/>
    Open to collaborate &#x1F91D; Let's build something epic together
  </text>

  <!-- Animated dots at corners -->
  <circle cx="30" cy="30" r="3" fill="#00FFFF">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="30" r="3" fill="#FF6B9D">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="30" cy="270" r="3" fill="#BB66FF">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="870" cy="270" r="3" fill="#FFBD2E">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>