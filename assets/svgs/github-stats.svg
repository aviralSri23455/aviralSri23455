<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <rect width="900" height="180" fill="#0d1117"/>

  <!-- Panel 1: Real GitHub Stats -->
  <rect x="15" y="10" width="420" height="160" rx="8" fill="#161b22" stroke="#00FFFF" stroke-width="0.8">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="35" y="35" font-family="monospace" font-size="10" fill="#00FFFF" letter-spacing="2">GITHUB OVERVIEW</text>
  
  <text x="35" y="68" font-family="monospace" font-size="18" fill="#fff" font-weight="bold">36</text>
  <text x="70" y="68" font-family="monospace" font-size="10" fill="#8b949e">repositories</text>
  
  <text x="35" y="100" font-family="monospace" font-size="18" fill="#fff" font-weight="bold">12</text>
  <text x="68" y="100" font-family="monospace" font-size="10" fill="#8b949e">followers</text>
  
  <text x="35" y="132" font-family="monospace" font-size="18" fill="#fff" font-weight="bold">29</text>
  <text x="70" y="132" font-family="monospace" font-size="10" fill="#8b949e">following</text>

  <!-- Panel 2: Top Languages (real from profile) -->
  <rect x="465" y="10" width="420" height="160" rx="8" fill="#161b22" stroke="#BB66FF" stroke-width="0.8">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="0.5s"/>
  </rect>
  <text x="485" y="35" font-family="monospace" font-size="10" fill="#BB66FF" letter-spacing="2">TOP LANGUAGES</text>

  <text x="485" y="58" font-family="monospace" font-size="10" fill="#ccc">Python</text>
  <rect x="485" y="63" width="360" height="7" rx="3" fill="#21262d"/>
  <rect x="485" y="63" width="0" height="7" rx="3" fill="#3572A5"><animate attributeName="width" from="0" to="270" dur="1s" begin="0.5s" fill="freeze"/></rect>

  <text x="485" y="88" font-family="monospace" font-size="10" fill="#ccc">TypeScript</text>
  <rect x="485" y="93" width="360" height="7" rx="3" fill="#21262d"/>
  <rect x="485" y="93" width="0" height="7" rx="3" fill="#3178C6"><animate attributeName="width" from="0" to="234" dur="1s" begin="0.8s" fill="freeze"/></rect>

  <text x="485" y="118" font-family="monospace" font-size="10" fill="#ccc">JavaScript</text>
  <rect x="485" y="123" width="360" height="7" rx="3" fill="#21262d"/>
  <rect x="485" y="123" width="0" height="7" rx="3" fill="#F7DF1E"><animate attributeName="width" from="0" to="180" dur="1s" begin="1.1s" fill="freeze"/></rect>

  <text x="485" y="148" font-family="monospace" font-size="10" fill="#ccc">Go</text>
  <rect x="485" y="153" width="360" height="7" rx="3" fill="#21262d"/>
  <rect x="485" y="153" width="0" height="7" rx="3" fill="#00ADD8"><animate attributeName="width" from="0" to="72" dur="1s" begin="1.4s" fill="freeze"/></rect>
</svg>