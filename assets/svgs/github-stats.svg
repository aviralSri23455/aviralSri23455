<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      @keyframes countUp { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
      @keyframes barFill { 0% { width: 0; } 100% { width: var(--w); } }
      @keyframes borderGlow { 0%,100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.7; } }
      @keyframes dotPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
      @keyframes streak { 0%,100% { fill: #00FFFF; } 50% { fill: #FF6B6B; } }
      .bg { fill: #0a0e1a; }
      .panel { fill: #0d1219; stroke: #00FFFF; stroke-width: 1; rx: 8; animation: borderGlow 4s ease-in-out infinite; }
      .panel-title { font-family: "JetBrains Mono", monospace; font-size: 10px; fill: #00FFFF; letter-spacing: 2px; opacity: 0.8; }
      .stat-big { font-family: "JetBrains Mono", monospace; font-size: 32px; fill: #ffffff; font-weight: bold; }
      .stat-label { font-family: "JetBrains Mono", monospace; font-size: 10px; fill: #555; }
      .bar-bg { fill: #141c26; rx: 3; }
      .bar-fill { rx: 3; opacity: 0.85; }
      .lang-label { font-family: "JetBrains Mono", monospace; font-size: 10px; fill: #aaa; }
      .lang-pct { font-family: "JetBrains Mono", monospace; font-size: 10px; fill: #00FFFF; }
      .fire { font-size: 22px; animation: streak 2s ease-in-out infinite; }
      .count-anim { animation: countUp 0.6s ease forwards; opacity: 0; }
      .streak-num { font-family: "JetBrains Mono", monospace; font-size: 38px; fill: #00FFFF; font-weight: bold; }
      .streak-label { font-family: "JetBrains Mono", monospace; font-size: 11px; fill: #888; }
      .mini-stat { font-family: "JetBrains Mono", monospace; font-size: 18px; fill: #ffffff; font-weight: bold; }
      .mini-label { font-family: "JetBrains Mono", monospace; font-size: 9px; fill: #555; }
    </style>
  </defs>
  
  <rect class="bg" width="900" height="220"/>
  
  <!-- LEFT PANEL: GitHub Stats -->
  <rect class="panel" x="15" y="10" width="290" height="200"/>
  <text class="panel-title" x="35" y="32">GITHUB STATS</text>
  
  <!-- Stats grid -->
  <text class="mini-stat count-anim" x="45" y="70" style="animation-delay:0.2s">247</text>
  <text class="mini-label" x="45" y="85">CONTRIBUTIONS</text>
  
  <text class="mini-stat count-anim" x="160" y="70" style="animation-delay:0.4s">35</text>
  <text class="mini-label" x="160" y="85">REPOSITORIES</text>
  
  <text class="mini-stat count-anim" x="45" y="120" style="animation-delay:0.6s">120+</text>
  <text class="mini-label" x="45" y="135">COMMITS (2024)</text>
  
  <text class="mini-stat count-anim" x="160" y="120" style="animation-delay:0.8s">15</text>
  <text class="mini-label" x="160" y="135">PULL REQUESTS</text>
  
  <!-- Activity bar chart -->
  <text class="mini-label" x="35" y="160">ACTIVITY</text>
  <rect class="bar-bg" x="35" y="168" width="250" height="6"/>
  <rect class="bar-fill" x="35" y="168" width="180" height="6" fill="#00FFFF"/>
  <rect class="bar-bg" x="35" y="180" width="250" height="6"/>
  <rect class="bar-fill" x="35" y="180" width="120" height="6" fill="#FF6B6B"/>
  <rect class="bar-bg" x="35" y="192" width="250" height="6"/>
  <rect class="bar-fill" x="35" y="192" width="200" height="6" fill="#FFBD2E"/>
  
  <!-- CENTER PANEL: Streak -->
  <rect class="panel" x="320" y="10" width="260" height="200"/>
  <text class="panel-title" x="340" y="32">CURRENT STREAK</text>
  
  <!-- Fire icon -->
  <text class="fire" x="420" y="80">&#x1F525;</text>
  
  <!-- Streak number -->
  <text class="streak-num count-anim" x="450" y="125" text-anchor="middle" style="animation-delay:0.5s">42</text>
  <text class="streak-label" x="450" y="145" text-anchor="middle">days</text>
  
  <!-- Mini streak stats -->
  <line x1="340" y1="160" x2="560" y2="160" stroke="#1a2a4a" stroke-width="1"/>
  <text class="mini-label" x="365" y="180" text-anchor="middle">TOTAL</text>
  <text font-family="JetBrains Mono, monospace" font-size="14" fill="#fff" x="365" y="198" text-anchor="middle" font-weight="bold">847</text>
  
  <text class="mini-label" x="450" y="180" text-anchor="middle">LONGEST</text>
  <text font-family="JetBrains Mono, monospace" font-size="14" fill="#fff" x="450" y="198" text-anchor="middle" font-weight="bold">78</text>
  
  <text class="mini-label" x="535" y="180" text-anchor="middle">AVG/WEEK</text>
  <text font-family="JetBrains Mono, monospace" font-size="14" fill="#fff" x="535" y="198" text-anchor="middle" font-weight="bold">5.2</text>
  
  <!-- RIGHT PANEL: Top Languages -->
  <rect class="panel" x="595" y="10" width="290" height="200"/>
  <text class="panel-title" x="615" y="32">TOP LANGUAGES</text>
  
  <!-- Language bars -->
  <text class="lang-label" x="615" y="58">TypeScript</text>
  <rect class="bar-bg" x="615" y="63" width="220" height="8"/>
  <rect class="bar-fill" x="615" y="63" width="176" height="8" fill="#3178C6"/>
  <text class="lang-pct" x="845" y="71">38%</text>
  
  <text class="lang-label" x="615" y="90">Python</text>
  <rect class="bar-bg" x="615" y="95" width="220" height="8"/>
  <rect class="bar-fill" x="615" y="95" width="132" height="8" fill="#3572A5"/>
  <text class="lang-pct" x="845" y="103">28%</text>
  
  <text class="lang-label" x="615" y="122">JavaScript</text>
  <rect class="bar-bg" x="615" y="127" width="220" height="8"/>
  <rect class="bar-fill" x="615" y="127" width="88" height="8" fill="#F7DF1E"/>
  <text class="lang-pct" x="845" y="135">18%</text>
  
  <text class="lang-label" x="615" y="154">Go</text>
  <rect class="bar-bg" x="615" y="159" width="220" height="8"/>
  <rect class="bar-fill" x="615" y="159" width="44" height="8" fill="#00ADD8"/>
  <text class="lang-pct" x="845" y="167">9%</text>
  
  <text class="lang-label" x="615" y="186">Rust</text>
  <rect class="bar-bg" x="615" y="191" width="220" height="8"/>
  <rect class="bar-fill" x="615" y="191" width="33" height="8" fill="#DEA584"/>
  <text class="lang-pct" x="845" y="199">7%</text>
</svg>