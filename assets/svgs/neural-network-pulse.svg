<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <rect width="900" height="300" rx="8" fill="#080c18"/>
  <rect x="2" y="2" width="896" height="296" rx="8" fill="none" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Concentric radar rings -->
  <circle cx="450" cy="150" r="120" fill="none" stroke="#00FFFF" stroke-width="0.6" stroke-opacity="0.2"/>
  <circle cx="450" cy="150" r="85" fill="none" stroke="#00FFFF" stroke-width="0.6" stroke-opacity="0.15"/>
  <circle cx="450" cy="150" r="50" fill="none" stroke="#00FFFF" stroke-width="0.6" stroke-opacity="0.3"/>
  
  <!-- Radar sweep line (SMIL rotate) -->
  <line x1="450" y1="150" x2="450" y2="30" stroke="#00FFFF" stroke-width="1.5" stroke-opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 450 150" to="360 450 150" dur="6s" repeatCount="indefinite"/>
  </line>
  
  <!-- Radar glow trail -->
  <path d="M450,150 L435,32 L450,30 Z" fill="#00FFFF" opacity="0.08">
    <animateTransform attributeName="transform" type="rotate" from="0 450 150" to="360 450 150" dur="6s" repeatCount="indefinite"/>
  </path>

  <!-- LEFT CLUSTER - Constellation nodes with SMIL pulse -->
  <!-- Edges first (behind nodes) -->
  <g stroke="#00FFFF" stroke-width="0.8" fill="none" stroke-opacity="0.25">
    <line x1="75" y1="55" x2="130" y2="90"/>
    <line x1="75" y1="55" x2="50" y2="110"/>
    <line x1="130" y1="90" x2="160" y2="140"/>
    <line x1="50" y1="110" x2="80" y2="160"/>
    <line x1="80" y1="160" x2="160" y2="140"/>
    <line x1="160" y1="140" x2="200" y2="100"/>
    <line x1="200" y1="100" x2="240" y2="130"/>
    <line x1="80" y1="160" x2="40" y2="210"/>
    <line x1="40" y1="210" x2="110" y2="230"/>
    <line x1="110" y1="230" x2="170" y2="200"/>
    <line x1="170" y1="200" x2="240" y2="220"/>
    <line x1="110" y1="230" x2="60" y2="270"/>
    <line x1="110" y1="230" x2="150" y2="265"/>
    <line x1="150" y1="265" x2="170" y2="200"/>
    <line x1="240" y1="130" x2="260" y2="185"/>
    <line x1="260" y1="185" x2="240" y2="220"/>
    <line x1="50" y1="110" x2="130" y2="90"/>
    <line x1="40" y1="210" x2="60" y2="270"/>
  </g>
  
  <!-- Nodes with SMIL pulsing -->
  <circle cx="75" cy="55" fill="#00FFFF" r="5"><animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="50" cy="110" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="130" cy="90" fill="#00FFFF" r="5"><animate attributeName="r" values="5;8;5" dur="3.5s" repeatCount="indefinite" begin="0.5s"/><animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="80" cy="160" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite" begin="0.8s"/></circle>
  <circle cx="160" cy="140" fill="#00FFFF" r="6"><animate attributeName="r" values="6;9;6" dur="3s" repeatCount="indefinite" begin="1s"/><animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="1s"/></circle>
  <circle cx="200" cy="100" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3.5s" repeatCount="indefinite" begin="1.3s"/></circle>
  <circle cx="240" cy="130" fill="#00FFFF" r="5"><animate attributeName="r" values="5;7;5" dur="4s" repeatCount="indefinite" begin="0.2s"/><animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite" begin="0.2s"/></circle>
  <circle cx="40" cy="210" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" begin="1.6s"/></circle>
  <circle cx="110" cy="230" fill="#00FFFF" r="6"><animate attributeName="r" values="6;9;6" dur="3.5s" repeatCount="indefinite" begin="0.7s"/><animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite" begin="0.7s"/></circle>
  <circle cx="170" cy="200" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite" begin="1.1s"/></circle>
  <circle cx="60" cy="270" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" begin="2s"/></circle>
  <circle cx="150" cy="265" fill="#00FFFF" r="5"><animate attributeName="r" values="5;7;5" dur="3.5s" repeatCount="indefinite" begin="0.4s"/><animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="260" cy="185" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite" begin="1.5s"/></circle>
  <circle cx="240" cy="220" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" begin="1.8s"/></circle>

  <!-- CENTER RADAR NODES -->
  <g stroke="#00FFFF" stroke-width="0.8" fill="none" stroke-opacity="0.3">
    <line x1="410" y1="110" x2="470" y2="95"/>
    <line x1="470" y1="95" x2="500" y2="145"/>
    <line x1="500" y1="145" x2="510" y2="200"/>
    <line x1="410" y1="110" x2="380" y2="165"/>
    <line x1="380" y1="165" x2="430" y2="190"/>
    <line x1="430" y1="190" x2="510" y2="200"/>
    <line x1="360" y1="125" x2="410" y2="110"/>
    <line x1="360" y1="125" x2="380" y2="165"/>
  </g>
  <circle cx="410" cy="110" fill="#00FFFF" r="5"><animate attributeName="r" values="5;8;5" dur="2.5s" repeatCount="indefinite" begin="0.3s"/><animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="470" cy="95" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" begin="0.8s"/></circle>
  <circle cx="500" cy="145" fill="#00FFFF" r="5"><animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite" begin="1.2s"/><animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="1.2s"/></circle>
  <circle cx="430" cy="190" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3.5s" repeatCount="indefinite" begin="1.5s"/></circle>
  <circle cx="380" cy="165" fill="#00FFFF" r="5"><animate attributeName="r" values="5;7;5" dur="2.8s" repeatCount="indefinite" begin="0.6s"/><animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle cx="510" cy="200" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" begin="1.8s"/></circle>
  <circle cx="360" cy="125" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite" begin="2.2s"/></circle>

  <!-- RIGHT CLUSTER -->
  <g stroke="#00FFFF" stroke-width="0.8" fill="none" stroke-opacity="0.25">
    <line x1="650" y1="70" x2="700" y2="55"/>
    <line x1="700" y1="55" x2="750" y2="85"/>
    <line x1="650" y1="70" x2="680" y2="135"/>
    <line x1="680" y1="135" x2="720" y2="115"/>
    <line x1="720" y1="115" x2="750" y2="85"/>
    <line x1="750" y1="85" x2="800" y2="125"/>
    <line x1="750" y1="85" x2="830" y2="75"/>
    <line x1="800" y1="125" x2="760" y2="170"/>
    <line x1="680" y1="135" x2="700" y2="205"/>
    <line x1="680" y1="135" x2="645" y2="185"/>
    <line x1="700" y1="205" x2="780" y2="225"/>
    <line x1="760" y1="170" x2="780" y2="225"/>
    <line x1="800" y1="125" x2="845" y2="195"/>
    <line x1="845" y1="195" x2="860" y2="255"/>
    <line x1="780" y1="225" x2="845" y2="195"/>
  </g>
  <circle cx="650" cy="70" fill="#00FFFF" r="5"><animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite" begin="0.2s"/><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="0.2s"/></circle>
  <circle cx="700" cy="55" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3.5s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="720" cy="115" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle cx="680" cy="135" fill="#00FFFF" r="5"><animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite" begin="1.1s"/><animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="1.1s"/></circle>
  <circle cx="750" cy="85" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3.5s" repeatCount="indefinite" begin="1.4s"/></circle>
  <circle cx="800" cy="125" fill="#00FFFF" r="5"><animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite" begin="1.7s"/><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="1.7s"/></circle>
  <circle cx="830" cy="75" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite" begin="2s"/></circle>
  <circle cx="760" cy="170" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" begin="2.3s"/></circle>
  <circle cx="700" cy="205" fill="#00FFFF" r="5"><animate attributeName="r" values="5;8;5" dur="3.5s" repeatCount="indefinite" begin="0.3s"/><animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="645" cy="185" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle cx="780" cy="225" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite" begin="1s"/></circle>
  <circle cx="845" cy="195" fill="#00FFFF" r="5"><animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite" begin="1.3s"/><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="1.3s"/></circle>
  <circle cx="860" cy="255" fill="#00FFFF" r="3"><animate attributeName="r" values="3;5;3" dur="3.5s" repeatCount="indefinite" begin="1.6s"/></circle>

  <!-- Orbiting satellite dots -->
  <circle r="4" fill="#FF6B6B">
    <animateMotion dur="8s" repeatCount="indefinite" path="M450,150 m-120,0 a120,120 0 1,1 240,0 a120,120 0 1,1 -240,0"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#FFBD2E">
    <animateMotion dur="12s" repeatCount="indefinite" path="M450,150 m-85,0 a85,85 0 1,0 170,0 a85,85 0 1,0 -170,0"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>