<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <style>
      @keyframes radarSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      @keyframes dotPulse { 0%,100% { opacity: 0.4; r: 3; } 50% { opacity: 1; r: 5; } }
      @keyframes slideIn { 0% { opacity: 0; transform: translateY(5px); } 100% { opacity: 1; transform: translateY(0); } }
      @keyframes borderPulse { 0%,100% { stroke-opacity: 0.2; } 50% { stroke-opacity: 0.5; } }
      @keyframes statusPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes heartbeat { 0%,40%,60%,100% { transform: scaleY(0.4); } 45% { transform: scaleY(1); } 55% { transform: scaleY(0.7); } }
      @keyframes scanline { 0% { y: 40; } 100% { y: 395; } }
      .bg { fill: #0a0e1a; }
      .panel { fill: #0d1219; stroke: #00FFFF; stroke-width: 0.8; rx: 6; animation: borderPulse 5s ease-in-out infinite; }
      .section-title { font-family: monospace; font-size: 14px; fill: #00FFFF; letter-spacing: 4px; font-weight: bold; }
      .diamond { fill: #00FFFF; }
      .panel-title { font-family: monospace; font-size: 10px; fill: #00FFFF; letter-spacing: 2px; opacity: 0.8; }
      .status-text { font-family: monospace; font-size: 11px; fill: #00FF00; }
      .status-warn { font-family: monospace; font-size: 11px; fill: #FFBD2E; }
      .dim-text { font-family: monospace; font-size: 10px; fill: #555; }
      .log-text { font-family: monospace; font-size: 10px; fill: #00FF00; }
      .log-cyan { font-family: monospace; font-size: 10px; fill: #00FFFF; }
      .log-white { font-family: monospace; font-size: 10px; fill: #ffffff; font-weight: bold; }
      .metric-text { font-family: monospace; font-size: 11px; fill: #00FFFF; }
      .radar-ring { fill: none; stroke: #00FFFF; stroke-width: 0.6; }
      .radar-cross { stroke: #00FFFF; stroke-width: 0.3; opacity: 0.3; }
      .radar-sweep { animation: radarSweep 5s linear infinite; }
      .blip { fill: #00FF00; animation: dotPulse 2s ease-in-out infinite; }
      .blip-warn { fill: #FFBD2E; animation: dotPulse 1.5s ease-in-out infinite; }
      .status-dot { fill: #00FF00; animation: statusPulse 2s ease-in-out infinite; }
      .status-dot-warn { fill: #FFBD2E; animation: statusPulse 1.5s ease-in-out infinite; }
      .hbeat { fill: #00FFFF; opacity: 0.7; animation: heartbeat 1.2s ease-in-out infinite; transform-origin: bottom; }
      .log-line { animation: slideIn 0.3s ease forwards; opacity: 0; }
      .scanline { fill: #00FFFF; opacity: 0.02; animation: scanline 6s linear infinite; }
    </style>
  </defs>
  <rect class="bg" width="900" height="400"/>
  
  <!-- Scanline effect -->
  <rect class="scanline" x="0" width="900" height="3"/>
  
  <!-- Section header -->
  <rect class="diamond" x="30" y="14" width="8" height="8" transform="rotate(45 34 18)"/>
  <text class="section-title" x="52" y="23">MISSION CONTROL</text>
  <text font-family="monospace" font-size="9" fill="#333" x="850" y="22" text-anchor="end">v3.0.1</text>
  
  <!-- LEFT: System Status Panel -->
  <rect class="panel" x="20" y="40" width="250" height="350"/>
  <text class="panel-title" x="40" y="62">SYSTEM STATUS</text>
  
  <circle class="status-dot" cx="42" cy="85" r="4"/>
  <text class="status-text" x="55" y="89">API Gateway......ONLINE</text>
  
  <circle class="status-dot" cx="42" cy="107" r="4" style="animation-delay:0.3s"/>
  <text class="status-text" x="55" y="111">AI Engine........ONLINE</text>
  
  <circle class="status-dot" cx="42" cy="129" r="4" style="animation-delay:0.6s"/>
  <text class="status-text" x="55" y="133">Database.........ONLINE</text>
  
  <circle class="status-dot" cx="42" cy="151" r="4" style="animation-delay:0.9s"/>
  <text class="status-text" x="55" y="155">Cache Layer......ONLINE</text>
  
  <circle class="status-dot" cx="42" cy="173" r="4" style="animation-delay:1.2s"/>
  <text class="status-text" x="55" y="177">CDN..............ONLINE</text>
  
  <circle class="status-dot-warn" cx="42" cy="195" r="4"/>
  <text class="status-warn" x="55" y="199">GPU Cluster......87%</text>
  
  <!-- Performance metrics -->
  <text class="panel-title" x="40" y="228">PERFORMANCE</text>
  <text class="metric-text" x="40" y="248">Latency:     42ms avg</text>
  <text class="metric-text" x="40" y="265">Throughput:  12.4k req/s</text>
  <text class="metric-text" x="40" y="282">Uptime:      99.97%</text>
  <text class="metric-text" x="40" y="299">Memory:      64% used</text>
  
  <!-- Heartbeat -->
  <text class="panel-title" x="40" y="325">HEARTBEAT</text>
  <rect class="hbeat" x="40" y="335" width="4" height="18" style="animation-delay:0s"/>
  <rect class="hbeat" x="48" y="335" width="4" height="18" style="animation-delay:0.1s"/>
  <rect class="hbeat" x="56" y="335" width="4" height="18" style="animation-delay:0.2s"/>
  <rect class="hbeat" x="64" y="335" width="4" height="18" style="animation-delay:0.3s"/>
  <rect class="hbeat" x="72" y="335" width="4" height="18" style="animation-delay:0.4s"/>
  <rect class="hbeat" x="80" y="335" width="4" height="18" style="animation-delay:0.5s"/>
  <rect class="hbeat" x="88" y="335" width="4" height="18" style="animation-delay:0.6s"/>
  <rect class="hbeat" x="96" y="335" width="4" height="18" style="animation-delay:0.7s"/>
  <rect class="hbeat" x="104" y="335" width="4" height="18" style="animation-delay:0.8s"/>
  <rect class="hbeat" x="112" y="335" width="4" height="18" style="animation-delay:0.9s"/>
  <rect class="hbeat" x="120" y="335" width="4" height="18" style="animation-delay:1.0s"/>
  <rect class="hbeat" x="128" y="335" width="4" height="18" style="animation-delay:1.1s"/>
  <rect class="hbeat" x="136" y="335" width="4" height="18" style="animation-delay:1.2s"/>
  <rect class="hbeat" x="144" y="335" width="4" height="18" style="animation-delay:1.3s"/>
  <rect class="hbeat" x="152" y="335" width="4" height="18" style="animation-delay:1.4s"/>
  <rect class="hbeat" x="160" y="335" width="4" height="18" style="animation-delay:1.5s"/>
  <rect class="hbeat" x="168" y="335" width="4" height="18" style="animation-delay:1.6s"/>
  <rect class="hbeat" x="176" y="335" width="4" height="18" style="animation-delay:1.7s"/>
  <rect class="hbeat" x="184" y="335" width="4" height="18" style="animation-delay:1.8s"/>
  <rect class="hbeat" x="192" y="335" width="4" height="18" style="animation-delay:1.9s"/>
  <rect class="hbeat" x="200" y="335" width="4" height="18" style="animation-delay:2.0s"/>
  <rect class="hbeat" x="208" y="335" width="4" height="18" style="animation-delay:2.1s"/>
  <rect class="hbeat" x="216" y="335" width="4" height="18" style="animation-delay:2.2s"/>
  <rect class="hbeat" x="224" y="335" width="4" height="18" style="animation-delay:2.3s"/>
  <rect class="hbeat" x="232" y="335" width="4" height="18" style="animation-delay:2.4s"/>
  <rect class="hbeat" x="240" y="335" width="4" height="18" style="animation-delay:2.5s"/>
  
  <!-- CENTER: Deploy Log -->
  <rect class="panel" x="285" y="40" width="330" height="350"/>
  <text class="panel-title" x="305" y="62">DEPLOY LOG</text>
  
  <text class="log-text log-line" x="305" y="85" style="animation-delay:0.2s">[06:01] git push origin main</text>
  <text class="log-text log-line" x="305" y="105" style="animation-delay:0.5s">[06:01] CI/CD pipeline triggered</text>
  <text class="log-cyan log-line" x="305" y="125" style="animation-delay:0.8s">[06:02] Running 847 tests...</text>
  <text class="log-text log-line" x="305" y="145" style="animation-delay:1.1s">[06:03] Tests passed (847/847)</text>
  <text class="log-cyan log-line" x="305" y="165" style="animation-delay:1.4s">[06:03] Building Docker image...</text>
  <text class="log-text log-line" x="305" y="185" style="animation-delay:1.7s">[06:04] Image pushed to ECR</text>
  <text class="log-cyan log-line" x="305" y="205" style="animation-delay:2.0s">[06:04] Rolling update: EKS</text>
  <text class="log-text log-line" x="305" y="225" style="animation-delay:2.3s">[06:05] Pod 1/3 ready</text>
  <text class="log-text log-line" x="305" y="245" style="animation-delay:2.6s">[06:05] Pod 2/3 ready</text>
  <text class="log-text log-line" x="305" y="265" style="animation-delay:2.9s">[06:05] Pod 3/3 ready</text>
  <text class="log-cyan log-line" x="305" y="285" style="animation-delay:3.2s">[06:06] Health check: PASSED</text>
  <text class="log-text log-line" x="305" y="305" style="animation-delay:3.5s">[06:06] DNS propagation done</text>
  <text class="log-white log-line" x="305" y="330" style="animation-delay:3.8s">[06:06] DEPLOY SUCCESSFUL</text>
  
  <text class="log-cyan" x="305" y="360">$ _</text>
  <rect x="325" y="349" width="7" height="13" fill="#00FF00" style="animation: blink 1s step-end infinite"/>
  
  <text class="dim-text" x="305" y="382">Next: feature/ai-agents in queue</text>
  
  <!-- RIGHT: Radar + Active Missions -->
  <rect class="panel" x="630" y="40" width="250" height="350"/>
  <text class="panel-title" x="650" y="62">ACTIVE MISSIONS</text>
  
  <!-- Radar -->
  <g transform="translate(755, 140)">
    <circle class="radar-ring" cx="0" cy="0" r="55" stroke-opacity="0.4"/>
    <circle class="radar-ring" cx="0" cy="0" r="38" stroke-opacity="0.3"/>
    <circle class="radar-ring" cx="0" cy="0" r="20" stroke-opacity="0.2"/>
    <line class="radar-cross" x1="0" y1="-55" x2="0" y2="55"/>
    <line class="radar-cross" x1="-55" y1="0" x2="55" y2="0"/>
    
    <!-- Sweep -->
    <g class="radar-sweep" style="transform-origin: 0px 0px">
      <line x1="0" y1="0" x2="0" y2="-55" stroke="#00FFFF" stroke-width="1" opacity="0.6"/>
      <path d="M0,0 L-15,-53 L0,-55 Z" fill="#00FFFF" opacity="0.08"/>
    </g>
    
    <!-- Blips -->
    <circle class="blip" cx="18" cy="-25" r="3" style="animation-delay:0s"/>
    <circle class="blip" cx="-30" cy="12" r="3" style="animation-delay:0.5s"/>
    <circle class="blip-warn" cx="35" cy="28" r="3" style="animation-delay:1.0s"/>
    <circle class="blip" cx="-12" cy="-40" r="3" style="animation-delay:1.5s"/>
    <circle class="blip" cx="8" cy="42" r="3" style="animation-delay:2.0s"/>
  </g>
  
  <!-- Mission list -->
  <text class="metric-text" x="650" y="220">01. AI SaaS Platform</text>
  <text class="dim-text" x="665" y="235">Progress: 78%</text>
  
  <text class="metric-text" x="650" y="258">02. RAG Knowledge Engine</text>
  <text class="dim-text" x="665" y="273">Progress: 62%</text>
  
  <text class="metric-text" x="650" y="296">03. Real-time Analytics</text>
  <text class="dim-text" x="665" y="311">Status: Planning</text>
  
  <text class="metric-text" x="650" y="334">04. Edge AI Deploy</text>
  <text class="dim-text" x="665" y="349">Research: 45%</text>
  
  <!-- Footer -->
  <text font-family="monospace" font-size="8" fill="#333" x="755" y="380" text-anchor="middle">AVIRAL.DEV | MISSION CTRL</text>
</svg>